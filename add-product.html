<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكان الخور - إدخال وتوريد البضائع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- مكتبة كشف الباركود المحدثة -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-slate-900 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold text-blue-500">مخزن dukan al-khor السحابي</h1>
        <p class="text-xs text-slate-400 mt-1">توريد، جرد، وزيادة كميات الرفوف الذكية</p>
    </header>

    <main class="container mx-auto p-4 max-w-xl flex-grow flex flex-col justify-center">
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 space-y-4">
            <div class="flex justify-between items-center border-b pb-3">
                <h2 class="text-lg font-bold text-slate-700">📋 نموذج توريد صنف جديد/موجود</h2>
                <a href="index.html" class="text-xs bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold px-3 py-1.5 rounded-lg transition">⬅️ شاشة الكاشير</a>
            </div>

            <div class="text-center">
                <button type="button" onclick="toggleAddScanner()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
                    📷 تشغيل الكاميرا الخلفية لقراءة الباركود
                </button>
                <div id="add-reader-container" class="hidden mt-3 bg-slate-50 p-3 rounded-xl border">
                    <div id="add-reader" class="mx-auto max-w-xs overflow-hidden rounded-lg"></div>
                </div>
            </div>

            <form id="productForm" class="space-y-4 text-right">
                <div>
                    <label class="block text-slate-600 text-xs font-bold mb-1">رقم الباركود:</label>
                    <input type="text" id="barcode" placeholder="امسح بالباركود أو اتركه فارغاً" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div>
                    <label class="block text-slate-600 text-xs font-bold mb-1">اسم الصنف / السلعة:</label>
                    <input type="text" id="productName" required placeholder="مثال: عصير، صابون" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-600 text-xs font-bold mb-1">الرف / التصنيف السلعي:</label>
                        <input type="text" id="category" required placeholder="مثال: ألبان، منظفات" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-slate-600 text-xs font-bold mb-1">الكمية الجديدة الموردة:</label>
                        <input type="number" id="quantity" required min="1" placeholder="مثال: 50" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-600 text-xs font-bold mb-1">سعر التكلفة (للحبة):</label>
                        <input type="number" step="0.01" id="costPrice" required placeholder="0.00" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-slate-600 text-xs font-bold mb-1">سعر البيع للجمهور (للحبة):</label>
                        <input type="number" step="0.01" id="price" required placeholder="0.00" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg text-base shadow transition">
                    📥 توريد وحفظ الصنف في المخزن السحابي
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 text-center py-2 text-2xs font-medium">
        دكان الخور - لوحة التحكم اللوجستية الموحدة لعام 2026 م
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoLitsuyvUgV4Jq2YtV2Ng2xnocFIiksk",
            authDomain: "shop-pos-firebase.firebaseapp.com",
            projectId: "shop-pos-firebase",
            storageBucket: "shop-pos-firebase.firebasestorage.app",
            messagingSenderId: "970725406691",
            appId: "1:970725406691:web:a1f769d0f11357423c52d6",
            measurementId: "G-KR4RSBW9D5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let addQrcodeScanner = null;

        window.toggleAddScanner = () => {
            const container = document.getElementById('add-reader-container');
            if (addQrcodeScanner) {
                addQrcodeScanner.stop().then(() => {
                    addQrcodeScanner.clear();
                    addQrcodeScanner = null;
                    container.classList.add('hidden');
                }).catch(err => console.log(err));
            } else {
                container.classList.remove('hidden');
                addQrcodeScanner = new Html5Qrcode("add-reader");
                addQrcodeScanner.start(
                    { facingMode: "environment" }, // تشغيل الكاميرا الخلفية إجبارياً
                    { fps: 10, qrbox: { width: 220, height: 220 } },
                    async (decodedText) => {
                        document.getElementById('barcode').value = decodedText;
                        window.toggleAddScanner();
                        
                        const snap = await db.collection('products').where('barcode', '==', decodedText).get();
                        if (!snap.empty) {
                            const doc = snap.docs[0];
                            const data = doc.data();
                            document.getElementById('productName').value = data.productName || data.product_name || '';
                            document.getElementById('category').value = data.category || 'عام';
                            document.getElementById('costPrice').value = data.costPrice || data.purchase_price_piece || '';
                            document.getElementById('price').value = data.price || data.sale_price_piece || '';
                            alert('🔍 تم التعرف على الصنف تلقائياً بسجلات دكان الخور! أدخل الكمية الإضافية الموردة.');
                        }
                    },
                    (err) => {}
                ).catch(err => {
                    alert("يرجى التحقق من إعطاء صلاحية الكاميرا للمتصفح.");
                    container.classList.add('hidden');
                    addQrcodeScanner = null;
                });
            }
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const barcode = document.getElementById('barcode').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const category = document.getElementById('category').value.trim() || "عام";
            const inputQty = parseInt(document.getElementById('quantity').value);
            const costPrice = parseFloat(document.getElementById('costPrice').value);
            const price = parseFloat(document.getElementById('price').value);

            try {
                let queryRef = null;
                if (barcode) {
                    queryRef = await db.collection('products').where('barcode', '==', barcode).get();
                } else {
                    queryRef = await db.collection('products').where('productName', '==', productName).get();
                }

                if (queryRef && !queryRef.empty) {
                    const docId = queryRef.docs[0].id;
                    const existingData = queryRef.docs[0].data();
                    const currentQty = parseInt(existingData.quantity || 0);
                    
                    await db.collection('products').doc(docId).update({
                        quantity: currentQty + inputQty,
                        costPrice: costPrice,
                        price: price,
                        category: category
                    });
                    alert(`📥 تم دمج الكمية بنجاح! المخزون السحابي الكلي الحالي: ${currentQty + inputQty} حبة.`);
                } else {
                    await db.collection('products').add({
                        barcode: barcode || "",
                        productName: productName,
                        category: category,
                        quantity: inputQty,
                        costPrice: costPrice,
                        price: price,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert('✨ نجح تسجيل وتوريد الصنف الجديد كلياً في رفوف دكان الخور!');
                }

                document.getElementById('productForm').reset();
            } catch (err) {
                alert('❌ فشل حفظ المورد السحابي: ' + err.message);
            }
        });
    </script>
</body>
</html>

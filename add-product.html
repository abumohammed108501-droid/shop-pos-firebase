<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة البضاعة - دكان غسق</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; }
        .nav-bar { background-color: #2c3e50; padding: 12px 20px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-btn { background: #34495e; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 15px; font-weight: bold; }
        .nav-btn:hover, .nav-btn.active { background: #007bff; }
        .form-container { max-width: 700px; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2c3e50; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn:hover { background: #0056b3; }
        .footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: 14px; border-top: 1px solid #ddd; margin-top: 40px; background: #fff; font-weight: 500; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="nav-btn">🛒 شاشة البيع</a>
    <a href="add-product.html" class="nav-btn active">📦 إضافة بضاعة جديدة</a>
    <a href="inventory.html" class="nav-btn">📊 جرد المخزون</a>
    <a href="customers.html" class="nav-btn">👥 دفتر الديون</a>
    <a href="dashboard.html" class="nav-btn">📈 الإحصائيات والمالية</a>
</div>

<div class="form-container">
    <h2>📦 تسجيل وتكويد صنف جديد في السحاب</h2>
    <form id="productForm" onsubmit="event.preventDefault();">
        <div class="form-group">
            <label>اسم المنتج الفعلي:</label>
            <input type="text" id="productName" placeholder="مثال: صابون لوكس عبوة صغيرة" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>باركود الحبة المفردة:</label>
                <input type="text" id="barcodePiece" placeholder="امسح باركود الحبة هنا...">
            </div>
            <div class="form-group">
                <label>باركود الكرتون الكامل:</label>
                <input type="text" id="barcodeBox" placeholder="امسح باركود الكرتون هنا...">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>معامل التحويل (الكرتون فيه كم حبة؟):</label>
                <input type="number" id="boxFactor" value="12" required>
            </div>
            <div class="form-group">
                <label>موقع الرف في المحل:</label>
                <input type="text" id="shelfNumber" placeholder="مثال: رف أ-3">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>سعر تكلفة (الحبة الواحدة):</label>
                <input type="number" step="0.01" id="costPricePiece" placeholder="ر.س" required>
            </div>
            <div class="form-group">
                <label>سعر بيع (الحبة الواحدة):</label>
                <input type="number" step="0.01" id="salePricePiece" placeholder="ر.س" required>
            </div>
            <div class="form-group">
                <label>سعر بيع (الكرتون كاملاً):</label>
                <input type="number" step="0.01" id="salePriceBox" placeholder="ر.س" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>الكمية الافتتاحية الواصلة للمخزن حالياً (بالحبات):</label>
                <input type="number" id="currentStock" value="100" required>
            </div>
            <div class="form-group">
                <label>حد الطلب الأدنى للتنبيه بنفاد الصنف:</label>
                <input type="number" id="minLevel" value="10" required>
            </div>
        </div>
        <button type="button" class="btn" onclick="saveProduct()">💾 حفظ الصنف في قاعدة البيانات السحابية</button>
    </form>
</div>

<div class="footer">
    تطوير وتصميم: عمر يوسف البطحاني © ٢٠٢٦ م
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoLitsuyvUgV4Jq2YtV2Ng2xnocFIiksk",
        authDomain: "shop-pos-firebase.firebaseapp.com",
        projectId: "shop-pos-firebase",
        storageBucket: "shop-pos-firebase.firebasestorage.app",
        messagingSenderId: "970725406691",
        appId: "1:970725406691:web:a1f769d0f11357423c52d6",
        measurementId: "G-KR4RSBW9D5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveProduct = async () => {
        const pName = document.getElementById('productName').value.trim();
        if(!pName) return alert("الرجاء تعبئة اسم المنتج!");

        try {
            await addDoc(collection(db, "products"), {
                product_name: pName,
                barcode_piece: document.getElementById('barcodePiece').value.trim(),
                barcode_box: document.getElementById('barcodeBox').value.trim(),
                shelf_number: document.getElementById('shelfNumber').value.trim(),
                box_factor: parseInt(document.getElementById('boxFactor').value) || 1,
                cost_price_piece: parseFloat(document.getElementById('costPricePiece').value) || 0,
                sale_price_piece: parseFloat(document.getElementById('salePricePiece').value) || 0,
                sale_price_box: parseFloat(document.getElementById('salePriceBox').value) || 0,
                current_stock_pieces: parseInt(document.getElementById('currentStock').value) || 0,
                min_stock_level: parseInt(document.getElementById('minLevel').value) || 5,
                created_at: new Date()
            });

            alert(`نجح الحفظ السحابي للصنف: (${pName})`);
            document.getElementById('productForm').reset();
        } catch (e) { alert("حدث خلل أثناء الاتصال بقاعدة البيانات."); }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكان الخور - مخزن البضائع اللوجستي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="bg-slate-900 text-white p-3 shadow-md text-center">
        <h1 class="text-xl font-black text-blue-500"><i class="fa-solid fa-boxes-stacked ml-1.5"></i>مخزن دكان الخور السحابي</h1>
        <p class="text-2xs text-slate-400 mt-0.5">لوحة التحكم السحابية الموحدة وتوريد الرفوف الذكية</p>
    </header>

    <main class="container mx-auto p-4 max-w-xl flex-grow flex flex-col justify-center">
        <div class="bg-white p-5 rounded-2xl shadow-xl border border-slate-200 space-y-4">
            <div class="flex justify-between items-center border-b pb-2">
                <h2 class="text-sm font-bold text-slate-700"><i class="fa-solid fa-square-plus text-blue-500 ml-1"></i> نموذج توريد / زيادة كمية صنف</h2>
                <button onclick="backToPOS()" class="text-2xs bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold px-3 py-1.5 rounded-lg transition">⬅️ شاشة الكاشير</button>
            </div>

            <div class="text-center">
                <button type="button" onclick="toggleAddScanner()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg text-xs transition flex items-center justify-center gap-2 shadow">
                    <i class="fa-solid fa-camera"></i> تشغيل الكاميرا المحدثة لقراءة الباركود بدون تكرار
                </button>
                <div id="add-reader-container" class="hidden mt-3 bg-slate-50 p-2 rounded-xl border">
                    <div id="add-reader" class="mx-auto max-w-xs overflow-hidden rounded-lg"></div>
                </div>
            </div>

            <form id="productForm" class="space-y-3.5 text-right">
                <div class="relative">
                    <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-barcode ml-1"></i> رقم باركود السلعة:</label>
                    <div class="flex gap-2">
                        <input type="text" id="barcode" placeholder="امسح بالباركد أو اكتبه يدوياً" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="clearBarcodeAndInputs()" class="bg-slate-100 hover:bg-slate-200 font-bold text-2xs px-3 rounded-lg text-slate-600" title="مسح الخانات للبدء من جديد">جديد</button>
                    </div>
                </div>

                <div>
                    <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-tag ml-1"></i> اسم الصنف / السلعة:</label>
                    <input type="text" id="productName" required placeholder="مثال: دجاج ساديا، صابون تايد" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-folder ml-1"></i> الرف / التصنيف:</label>
                        <input type="text" id="category" required placeholder="مثال: مجمدات، منظفات" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-circle-plus ml-1"></i> الكمية الموردة الجديدة:</label>
                        <input type="number" id="quantity" required min="1" placeholder="مثال: 24" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-money-bill-1-wave ml-1"></i> سعر التكلفة (للحبة):</label>
                        <input type="number" step="0.01" id="costPrice" required placeholder="0.00 ر.س" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-slate-600 text-2xs font-bold mb-1"><i class="fa-solid fa-basket-shopping ml-1"></i> سعر البيع للجمهور:</label>
                        <input type="number" step="0.01" id="price" required placeholder="0.00 ر.س" class="w-full p-2 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm shadow transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cloud-arrow-up"></i> حفظ وتوريد فوري للرفوف السحابية
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 text-center py-2 text-2xs font-bold flex flex-col sm:flex-row justify-between items-center px-4 gap-1">
        <div><i class="fa-solid fa-cubes text-blue-500"></i> البرمجة والتشغيل الذكي: نظام غسق الموحد v2.0</div>
        <div>حقوق الطبع محفوظة لدكان الخور 2026 م</div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAoLitsuyvUgV4Jq2YtV2Ng2xnocFIiksk",
            authDomain: "shop-pos-firebase.firebaseapp.com",
            projectId: "shop-pos-firebase",
            storageBucket: "shop-pos-firebase.firebasestorage.app",
            messagingSenderId: "970725406691",
            appId: "1:970725406691:web:a1f769d0f11357423c52d6",
            measurementId: "G-KR4RSBW9D5"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let addQrcodeScanner = null;
        let lastScannedAddBarcode = "";
        let lastAddScanTime = 0;

        window.backToPOS = () => { window.location.href = "index.html"; };

        window.clearBarcodeAndInputs = () => {
            document.getElementById('productForm').reset();
            document.getElementById('barcode').value = "";
            lastScannedAddBarcode = "";
        };

        window.toggleAddScanner = () => {
            const container = document.getElementById('add-reader-container');
            if (addQrcodeScanner) {
                addQrcodeScanner.stop().then(() => {
                    addQrcodeScanner.clear();
                    addQrcodeScanner = null;
                    container.classList.add('hidden');
                }).catch(err => console.log(err));
            } else {
                container.classList.remove('hidden');
                addQrcodeScanner = new Html5Qrcode("add-reader");
                addQrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 15, qrbox: { width: 220, height: 220 }, rememberLastUsedCamera: true },
                    async (decodedText) => {
                        const now = Date.now();
                        if (decodedText === lastScannedAddBarcode && (now - lastAddScanTime < 2000)) return; 
                        lastScannedAddBarcode = decodedText;
                        lastAddScanTime = now;

                        document.getElementById('barcode').value = decodedText;
                        window.toggleAddScanner();
                        
                        const snap = await db.collection('products').where('barcode', '==', decodedText).get();
                        if (!snap.empty) {
                            const doc = snap.docs[0];
                            const data = doc.data();
                            document.getElementById('productName').value = data.productName || data.product_name || '';
                            document.getElementById('category').value = data.category || 'عام';
                            document.getElementById('costPrice').value = data.costPrice || data.purchase_price_piece || '';
                            document.getElementById('price').value = data.price || data.sale_price_piece || '';
                            alert('🔍 تم العثور على الصنف في الرفوف! أدخل الكمية الجديدة وسيتم دمجها تلقائياً.');
                        }
                    },
                    (err) => {}
                ).catch(err => {
                    alert("يرجى إعطاء صلاحية الكاميرا للمتصفح.");
                    container.classList.add('hidden');
                    addQrcodeScanner = null;
                });
            }
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const barcode = document.getElementById('barcode').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const category = document.getElementById('category').value.trim() || "عام";
            const inputQty = parseInt(document.getElementById('quantity').value);
            const costPrice = parseFloat(document.getElementById('costPrice').value);
            const price = parseFloat(document.getElementById('price').value);

            try {
                let queryRef = null;
                if (barcode) {
                    queryRef = await db.collection('products').where('barcode', '==', barcode).get();
                } else {
                    queryRef = await db.collection('products').where('productName', '==', productName).get();
                }

                if (queryRef && !queryRef.empty) {
                    const docId = queryRef.docs[0].id;
                    const existingData = queryRef.docs[0].data();
                    const currentQty = parseInt(existingData.quantity || 0);
                    
                    await db.collection('products').doc(docId).update({
                        quantity: currentQty + inputQty,
                        costPrice: costPrice,
                        price: price,
                        category: category
                    });
                    alert(`✅ تم تحديث ودمج الصنف! المخزون الكلي الحالي بالرف: ${currentQty + inputQty} حبة.`);
                } else {
                    await db.collection('products').add({
                        barcode: barcode || "",
                        productName: productName,
                        category: category,
                        quantity: inputQty,
                        costPrice: costPrice,
                        price: price,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert('✨ تم تسجيل وتوريد الصنف الجديد كلياً في مخزن دكان الخور!');
                }

                clearBarcodeAndInputs();
            } catch (err) {
                alert('❌ فشل حفظ التوريد السحابي: ' + err.message);
            }
        });
    </script>
</body>
</html>

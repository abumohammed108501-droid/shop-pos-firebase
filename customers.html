<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر ديون الدكان - سحابي ذكي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .box-container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2c3e50; text-align: center; }
        .flex-inputs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .flex-inputs input { flex: 1; min-width: 150px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #2c3e50; color: white; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box-container">
    <h2>📑 دفتر حسابات وعملاء الآجل والديون السحابي</h2>
    
    <h3>➕ تسجيل عميل جديد بالدفتر:</h3>
    <div class="flex-inputs">
        <input type="text" id="cName" placeholder="اسم العميل المعتمد الفعلي...">
        <input type="number" step="0.01" id="cDebt" placeholder="المديونية الافتتاحية الحالية إن وجدت (ر.س)..." value="0">
        <button class="btn" onclick="addNewCustomer()">فتح حساب للعميل</button>
    </div>

    <h3>👥 كشف مديونيات العملاء الحاليين:</h3>
    <table id="customersTable">
        <thead>
            <tr>
                <th>اسم العميل</th>
                <th>إجمالي الدين المطلوب منه</th>
                <th>تعديل الحساب (بيع آجل / سداد)</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4" style="text-align:center;">جاري تحميل دفتر الديون...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoLitsuyvUgV4Jq2YtV2Ng2xnocFIiksk",
        authDomain: "shop-pos-firebase.firebaseapp.com",
        projectId: "shop-pos-firebase",
        storageBucket: "shop-pos-firebase.firebasestorage.app",
        messagingSenderId: "970725406691",
        appId: "1:970725406691:web:a1f769d0f11357423c52d6",
        measurementId: "G-KR4RSBW9D5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadCustomers() {
        try {
            const querySnapshot = await getDocs(collection(db, "customers"));
            const tbody = document.querySelector('#customersTable tbody');
            tbody.innerHTML = '';

            querySnapshot.forEach((docSnap) => {
                const c = docSnap.data(); const id = docSnap.id;
                tbody.innerHTML += `
                    <tr>
                        <td><b>${c.customer_name}</b></td>
                        <td style="color:#d9534f; font-weight:bold;">${parseFloat(c.total_debt).toFixed(2)} ر.س</td>
                        <td>
                            <input type="number" id="amt-${id}" style="width:100px; padding:5px;" placeholder="المبلغ ر.س">
                        </td>
                        <td>
                            <button class="btn-pay" onclick="window.adjustDebt('${id}', 1, '${c.customer_name}')">➕ شراء آجل</button>
                            <button class="btn-pay" style="background:#dc3545;" onclick="window.adjustDebt('${id}', -1, '${c.customer_name}')">💵 استلام سداد</button>
                        </td>
                    </tr>
                `;
            });
        } catch(e) { console.error(e); }
    }

    window.addNewCustomer = async () => {
        const name = document.getElementById('cName').value.trim();
        const debt = parseFloat(document.getElementById('cDebt').value) || 0;
        if(!name) return alert("الرجاء كتابة اسم العميل أولاً!");

        try {
            await addDoc(collection(db, "customers"), { customer_name: name, total_debt: debt });
            alert(`تم فتح حساب مالي للعميل (${name}) بنجاح.`);
            document.getElementById('cName').value = ''; document.getElementById('cDebt').value = '0';
            loadCustomers();
        } catch(e) { alert("خلل بالاتصال."); }
    };

    window.adjustDebt = async (id, factor, name) => {
        const amt = parseFloat(document.getElementById(`amt-${id}`).value);
        if(!amt || amt <= 0) return alert("الرجاء إدخال قيمة صحيحة للعملية الحسابية!");

        try {
            const customerRef = doc(db, "customers", id);
            await updateDoc(customerRef, { total_debt: increment(amt * factor) });
            alert(`تم تحديث حساب العميل ${name} بمقدار ${amt} ر.س`);
            loadCustomers();
        } catch(e) { alert("حدث خطأ أثناء تعديل الحساب."); }
    };

    loadCustomers();
</script>
</body>
</html>
